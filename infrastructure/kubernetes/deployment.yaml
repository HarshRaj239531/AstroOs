apiVersion: apps/v1
kind: Deployment
metadata:
  name: astraos-web
  namespace: astraos
  labels:
    app: astraos-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: astraos-web
  template:
    metadata:
      labels:
        app: astraos-web
    spec:
      containers:
      - name: web
        image: astraos/web:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.astraos.com/api/v1"
---
apiVersion: v1
kind: Service
metadata:
  name: astraos-web-service
  namespace: astraos
spec:
  selector:
    app: astraos-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: astraos-ingress
  namespace: astraos
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: astraos.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: astraos-web-service
            port:
              number: 80
